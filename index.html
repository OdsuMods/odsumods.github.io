<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple 3D First-Person Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            pointer-events: none;
            z-index: 100;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="instructions">
        WASD - Move<br>
        Mouse - Look around<br>
        Click to lock mouse pointer<br>
        ESC - Release mouse
    </div>
    <div id="crosshair">+</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // Scene setup
        let camera, scene, renderer, controls;
        let move = { forward: false, backward: false, left: false, right: false };
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let prevTime = performance.now();

        // Game objects
        let objects = [];

        init();
        animate();

        function init() {
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6; // Eye height

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x88ccff);
            scene.fog = new THREE.Fog(0x88ccff, 10, 100);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 100, 30);
            scene.add(directionalLight);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Pointer Lock Controls
            controls = new THREE.PointerLockControls(camera, document.body);

            document.addEventListener('click', () => {
                controls.lock();
            });

            controls.addEventListener('lock', () => {
                document.getElementById('instructions').style.opacity = '0.3';
            });

            controls.addEventListener('unlock', () => {
                document.getElementById('instructions').style.opacity = '1';
            });

            // Keyboard controls
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // Window resize
            window.addEventListener('resize', onWindowResize);

            // Create a simple world
            createWorld();
        }

        function createWorld() {
            // Ground
            const groundGeometry = new THREE.PlaneGeometry(200, 200);
            const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x3a5f3a });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            objects.push(ground);

            // Add some boxes as obstacles/walls
            const boxMaterial = new THREE.MeshLambertMaterial({ color: 0x8b5a2b });

            // Central platform
            const platform = new THREE.Mesh(
                new THREE.BoxGeometry(20, 1, 20),
                new THREE.MeshLambertMaterial({ color: 0x555555 })
            );
            platform.position.set(0, 0.5, -10);
            scene.add(platform);
            objects.push(platform);

            // Random boxes
            for (let i = 0; i < 30; i++) {
                const size = Math.random() * 4 + 2;
                const box = new THREE.Mesh(
                    new THREE.BoxGeometry(size, size * 1.5, size),
                    boxMaterial
                );
                
                box.position.x = Math.random() * 80 - 40;
                box.position.z = Math.random() * 80 - 40;
                box.position.y = size * 0.75;
                
                // Avoid spawning too close to start
                if (Math.abs(box.position.x) < 8 && Math.abs(box.position.z) < 8) {
                    box.position.x += 15;
                }
                
                box.castShadow = true;
                box.receiveShadow = true;
                scene.add(box);
                objects.push(box);
            }

            // Some taller pillars
            for (let i = 0; i < 8; i++) {
                const pillar = new THREE.Mesh(
                    new THREE.BoxGeometry(3, 8 + Math.random() * 6, 3),
                    new THREE.MeshLambertMaterial({ color: 0x666666 })
                );
                pillar.position.x = Math.random() * 60 - 30;
                pillar.position.z = Math.random() * 60 - 30;
                pillar.position.y = pillar.geometry.parameters.height / 2;
                pillar.castShadow = true;
                pillar.receiveShadow = true;
                scene.add(pillar);
                objects.push(pillar);
            }

            // Skybox-like walls (very far)
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x224422 });
            const wall1 = new THREE.Mesh(new THREE.BoxGeometry(200, 50, 2), wallMat);
            wall1.position.set(0, 25, -100);
            scene.add(wall1);

            const wall2 = wall1.clone();
            wall2.position.set(0, 25, 100);
            scene.add(wall2);

            const wall3 = new THREE.Mesh(new THREE.BoxGeometry(2, 50, 200), wallMat);
            wall3.position.set(-100, 25, 0);
            scene.add(wall3);

            const wall4 = wall3.clone();
            wall4.position.set(100, 25, 0);
            scene.add(wall4);
        }

        function onKeyDown(event) {
            switch (event.code) {
                case 'KeyW': move.forward = true; break;
                case 'KeyS': move.backward = true; break;
                case 'KeyA': move.left = true; break;
                case 'KeyD': move.right = true; break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'KeyW': move.forward = false; break;
                case 'KeyS': move.backward = false; break;
                case 'KeyA': move.left = false; break;
                case 'KeyD': move.right = false; break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            prevTime = time;

            if (controls.isLocked) {
                // Movement
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(move.forward) - Number(move.backward);
                direction.x = Number(move.right) - Number(move.left);
                direction.normalize();

                const speed = 25;

                if (move.forward || move.backward) velocity.z -= direction.z * speed * delta;
                if (move.left || move.right) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // Simple collision with ground
                if (camera.position.y < 1.6) {
                    camera.position.y = 1.6;
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
