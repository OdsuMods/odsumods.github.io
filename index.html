<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Menu</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#111;
    color:white;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

/* MENU LINKS */
.nav-links{
    list-style:none;
    display:flex;
    gap:30px;
}

.nav-links li a{
    text-decoration:none;
    color:white;
    font-size:16px;
    position:relative;
}

/* HOVER EFFECT */
.nav-links li a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0%;
    height:2px;
    background:#00c3ff;
    transition:0.3s;
}

.nav-links li a:hover::after{
    width:100%;
}

/* HAMBURGER */
.hamburger{
    display:none;
    flex-direction:column;
    cursor:pointer;
}

.hamburger span{
    background:white;
    height:3px;
    width:25px;
    margin:4px 0;
}

/* MOBILE */
@media (max-width:768px){

.nav-links{
    position:absolute;
    right:0;
    top:60px;
    background:#111;
    flex-direction:column;
    width:200px;
    text-align:center;
    display:none;
    padding:20px 0;
}

.nav-links.active{
    display:flex;
}

.hamburger{
    display:flex;
}

}

/* DEMO CONTENT */
.hero{
    text-align:center;
    padding:120px 20px;
}

.hero h1{
    font-size:48px;
}

.hero p{
    font-size:20px;
    color:#555;
}

button{
    padding:12px 25px;
    border:none;
    background:#00c3ff;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<nav class="navbar">
<div class="logo">MySite</div>

<ul class="nav-links" id="navLinks">
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Portfolio</a></li>
<li><a href="#">Contact</a></li>
</ul>

<div class="hamburger" onclick="toggleMenu()">
<span></span>
<span></span>
<span></span>
</div>

</nav>

<section class="hero">
<h1>Welcome to My Website</h1>
<p>A clean responsive navigation menu example.</p>
<button>Get Started</button>
</section>

<script>
function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
