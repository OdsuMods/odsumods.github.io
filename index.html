<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My GitHub Page</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1c1c21;
    --border: #2a2a32;
    --accent: #7c6aff;
    --accent2: #ff6ac1;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --green: #4ade80;
    --red: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 40px;
    background: rgba(13,13,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .logo svg { color: var(--accent); }

  .logo span { color: var(--accent); }

  /* ── OWNER BUTTON ── */
  #owner-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 0 0 rgba(124,106,255,0.5);
  }

  #owner-btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(124,106,255,0.4);
  }

  #owner-btn:active { transform: translateY(0); }

  /* ── MAIN ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 64px 40px 120px;
  }

  .hero {
    margin-bottom: 64px;
  }

  .hero-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    background: rgba(124,106,255,0.1);
    border: 1px solid rgba(124,106,255,0.25);
    border-radius: 4px;
    padding: 4px 10px;
    margin-bottom: 20px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 20px;
  }

  h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero p {
    font-size: 1.05rem;
    color: var(--text-muted);
    max-width: 500px;
    line-height: 1.7;
    font-weight: 400;
  }

  /* ── MODS SECTION ── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  #mods-container {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    min-height: 60px;
  }

  .empty-state {
    width: 100%;
    padding: 32px;
    text-align: center;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    border: 1px dashed var(--border);
    border-radius: 10px;
    background: rgba(255,255,255,0.01);
  }

  /* ── RENDERED MODS ── */
  .mod-button {
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: filter 0.2s, transform 0.15s;
    position: relative;
  }

  .mod-button:hover { filter: brightness(1.15); transform: translateY(-2px); }

  .mod-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    max-width: 300px;
  }

  .mod-card h3 { font-size: 1rem; margin-bottom: 6px; }
  .mod-card p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; font-weight: 400; }

  .mod-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(124,106,255,0.35);
    transition: color 0.2s;
    align-self: flex-start;
  }

  .mod-link:hover { color: var(--accent2); }

  .mod-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: 500;
  }

  /* ── OVERLAY ── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  #overlay.open { display: flex; animation: fadeIn 0.2s ease; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── MODAL ── */
  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: min(560px, 94vw);
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(124,106,255,0.08);
    animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes slideUp {
    from { transform: translateY(30px) scale(0.97); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 28px 18px;
    border-bottom: 1px solid var(--border);
  }

  .modal-header h2 {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .modal-header h2 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #close-modal {
    width: 32px; height: 32px;
    display: grid; place-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    transition: color 0.2s, background 0.2s;
  }

  #close-modal:hover { background: var(--border); color: var(--text); }

  /* ── TYPE PICKER ── */
  .type-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 24px 28px 0;
  }

  .type-btn {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    color: var(--text);
  }

  .type-btn:hover {
    border-color: var(--accent);
    background: rgba(124,106,255,0.06);
    transform: translateY(-1px);
  }

  .type-btn.selected {
    border-color: var(--accent);
    background: rgba(124,106,255,0.1);
  }

  .type-btn .icon { font-size: 1.3rem; margin-bottom: 2px; }

  .type-btn .label {
    font-size: 0.85rem;
    font-weight: 700;
  }

  .type-btn .desc {
    font-size: 0.72rem;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-weight: 400;
  }

  /* ── FORM FIELDS ── */
  #config-panel {
    padding: 20px 28px 28px;
  }

  .field-group { margin-bottom: 16px; }

  label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }

  input[type="text"],
  input[type="color"],
  textarea,
  select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus,
  textarea:focus,
  select:focus { border-color: var(--accent); }

  textarea { resize: vertical; min-height: 72px; }

  input[type="color"] {
    padding: 4px 8px;
    height: 40px;
    cursor: pointer;
  }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* ── PREVIEW ── */
  #preview-wrap {
    margin: 0 28px 20px;
    padding: 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    min-height: 64px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .preview-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0 28px 6px;
  }

  /* ── ADD MOD SUBMIT ── */
  #add-mod-btn {
    width: calc(100% - 56px);
    margin: 0 28px 28px;
    display: block;
    padding: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  #add-mod-btn:hover { opacity: 0.9; transform: translateY(-1px); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
    </svg>
    <span>your</span>handle<span>/</span>project
  </div>

  <!-- Only the page owner would be signed in; this button is shown when authenticated -->
  <button id="owner-btn" onclick="openModal()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Add a mod
  </button>
</header>

<!-- ── MAIN CONTENT ── -->
<main>
  <div class="hero">
    <div class="hero-tag">✦ Open source</div>
    <h1>Build something <em>remarkable</em>.</h1>
    <p>A minimal GitHub Pages site. Drop mods onto this page using the owner panel — add buttons, cards, links, and badges without touching code.</p>
  </div>

  <p class="section-label">// page mods</p>
  <div id="mods-container">
    <div class="empty-state" id="empty-state">No mods yet — click <strong>"Add a mod"</strong> to drop one in.</div>
  </div>
</main>

<!-- ── MODAL OVERLAY ── -->
<div id="overlay" onclick="overlayClick(event)">
  <div id="modal">

    <div class="modal-header">
      <h2>Add a <span>mod</span></h2>
      <button id="close-modal" onclick="closeModal()">✕</button>
    </div>

    <!-- Step 1: type picker -->
    <div class="type-grid">
      <button class="type-btn selected" data-type="button" onclick="selectType(this,'button')">
        <span class="icon">🔲</span>
        <span class="label">Button</span>
        <span class="desc">Clickable CTA or action</span>
      </button>
      <button class="type-btn" data-type="card" onclick="selectType(this,'card')">
        <span class="icon">🃏</span>
        <span class="label">Card</span>
        <span class="desc">Title + description block</span>
      </button>
      <button class="type-btn" data-type="link" onclick="selectType(this,'link')">
        <span class="icon">🔗</span>
        <span class="label">Link</span>
        <span class="desc">Styled anchor element</span>
      </button>
      <button class="type-btn" data-type="badge" onclick="selectType(this,'badge')">
        <span class="icon">🏷️</span>
        <span class="label">Badge</span>
        <span class="desc">Status or label pill</span>
      </button>
    </div>

    <!-- Step 2: config -->
    <div id="config-panel"></div>

    <!-- Live preview -->
    <p class="preview-label">// live preview</p>
    <div id="preview-wrap"></div>

    <button id="add-mod-btn" onclick="addMod()">Add mod to page</button>
  </div>
</div>

<script>
  let currentType = 'button';

  // ── STORAGE: save/load mod data objects ──
  const STORAGE_KEY = 'github-page-mods';

  function loadMods() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveMods() {
    const mods = [];
    document.querySelectorAll('#mods-container [data-mod]').forEach(wrapper => {
      mods.push(JSON.parse(wrapper.dataset.mod));
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(mods));
  }

  /* ── MODAL OPEN/CLOSE ── */
  function openModal() {
    document.getElementById('overlay').classList.add('open');
    selectType(document.querySelector('.type-btn[data-type="button"]'), 'button');
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  function overlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  /* ── TYPE SELECTION ── */
  function selectType(el, type) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    currentType = type;
    renderConfigPanel(type);
  }

  /* ── CONFIG PANELS ── */
  const configs = {
    button: `
      <div class="field-group">
        <label>Button label</label>
        <input type="text" id="f-label" placeholder="Click me" oninput="updatePreview()" value="Click me" />
      </div>
      <div class="row-2">
        <div class="field-group">
          <label>Background color</label>
          <input type="color" id="f-bg" value="#7c6aff" oninput="updatePreview()" />
        </div>
        <div class="field-group">
          <label>Text color</label>
          <input type="color" id="f-color" value="#ffffff" oninput="updatePreview()" />
        </div>
      </div>
      <div class="field-group">
        <label>On click — open URL (optional)</label>
        <input type="text" id="f-url" placeholder="https://github.com/…" oninput="updatePreview()" />
      </div>
    `,
    card: `
      <div class="field-group">
        <label>Card title</label>
        <input type="text" id="f-title" placeholder="My feature" oninput="updatePreview()" value="My feature" />
      </div>
      <div class="field-group">
        <label>Description</label>
        <textarea id="f-desc" placeholder="A short description of this feature…" oninput="updatePreview()">A short description of this feature.</textarea>
      </div>
    `,
    link: `
      <div class="field-group">
        <label>Link text</label>
        <input type="text" id="f-label" placeholder="View docs →" oninput="updatePreview()" value="View docs →" />
      </div>
      <div class="field-group">
        <label>URL</label>
        <input type="text" id="f-url" placeholder="https://…" oninput="updatePreview()" value="https://github.com" />
      </div>
    `,
    badge: `
      <div class="field-group">
        <label>Badge text</label>
        <input type="text" id="f-label" placeholder="v1.0.0" oninput="updatePreview()" value="v1.0.0" />
      </div>
      <div class="row-2">
        <div class="field-group">
          <label>Background</label>
          <input type="color" id="f-bg" value="#4ade80" oninput="updatePreview()" />
        </div>
        <div class="field-group">
          <label>Text color</label>
          <input type="color" id="f-color" value="#0d0d0f" oninput="updatePreview()" />
        </div>
      </div>
      <div class="field-group">
        <label>Dot / emoji prefix (optional)</label>
        <input type="text" id="f-prefix" placeholder="●  or  🚀" oninput="updatePreview()" value="●" />
      </div>
    `
  };

  function renderConfigPanel(type) {
    document.getElementById('config-panel').innerHTML = configs[type];
    updatePreview();
  }

  /* ── LIVE PREVIEW ── */
  function val(id) {
    const el = document.getElementById(id);
    return el ? el.value : '';
  }

  function updatePreview() {
    const wrap = document.getElementById('preview-wrap');
    wrap.innerHTML = buildElementHTML(currentType, collectFormData(currentType));
  }

  // Collect current form values into a plain data object
  function collectFormData(type) {
    if (type === 'button') return { type, label: val('f-label'), bg: val('f-bg'), color: val('f-color'), url: val('f-url') };
    if (type === 'card')   return { type, title: val('f-title'), desc: val('f-desc') };
    if (type === 'link')   return { type, label: val('f-label'), url: val('f-url') };
    if (type === 'badge')  return { type, label: val('f-label'), bg: val('f-bg'), color: val('f-color'), prefix: val('f-prefix') };
  }

  // Build HTML string from a data object
  function buildElementHTML(type, d) {
    if (type === 'button') {
      const bg = d.bg || '#7c6aff', color = d.color || '#fff', label = d.label || 'Button';
      const click = d.url ? `onclick="window.open('${d.url}','_blank')"` : '';
      return `<button class="mod-button" style="background:${bg};color:${color}" ${click}>${label}</button>`;
    }
    if (type === 'card') {
      return `<div class="mod-card"><h3>${d.title || 'Card title'}</h3><p>${d.desc || 'Description.'}</p></div>`;
    }
    if (type === 'link') {
      return `<a class="mod-link" href="${d.url || '#'}" target="_blank">${d.label || 'Link'}</a>`;
    }
    if (type === 'badge') {
      const bg = d.bg || '#4ade80', color = d.color || '#0d0d0f', label = d.label || 'Badge';
      return `<span class="mod-badge" style="background:${bg}20;color:${color};border:1px solid ${bg}55">${d.prefix ? `<span>${d.prefix}</span>` : ''} ${label}</span>`;
    }
    return '';
  }

  /* ── MOUNT A MOD WRAPPER FROM DATA OBJECT ── */
  function mountMod(data, skipSave) {
    const container = document.getElementById('mods-container');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:relative;display:inline-flex;align-items:flex-start;';
    wrapper.dataset.mod = JSON.stringify(data);

    wrapper.innerHTML = buildElementHTML(data.type, data);

    const remove = document.createElement('button');
    remove.textContent = '×';
    remove.title = 'Remove mod';
    remove.style.cssText = `
      position:absolute;top:-8px;right:-8px;
      width:20px;height:20px;border-radius:50%;
      background:#f87171;color:#fff;border:none;
      font-size:0.75rem;cursor:pointer;display:none;
      line-height:1;font-family:'Syne',sans-serif;font-weight:700;
    `;
    remove.onclick = () => {
      wrapper.remove();
      if (!document.querySelectorAll('#mods-container [data-mod]').length) {
        const e = document.createElement('div');
        e.id = 'empty-state';
        e.className = 'empty-state';
        e.innerHTML = 'No mods yet — click <strong>"Add a mod"</strong> to drop one in.';
        container.appendChild(e);
      }
      saveMods();
    };

    wrapper.addEventListener('mouseenter', () => remove.style.display = 'grid');
    wrapper.addEventListener('mouseleave', () => remove.style.display = 'none');
    wrapper.appendChild(remove);
    container.appendChild(wrapper);

    if (!skipSave) saveMods();
  }

  /* ── ADD MOD (from form) ── */
  function addMod() {
    const data = collectFormData(currentType);
    mountMod(data);
    closeModal();
  }

  /* ── RESTORE ON LOAD ── */
  document.addEventListener('DOMContentLoaded', () => {
    const saved = loadMods();
    saved.forEach(data => mountMod(data, true));
    renderConfigPanel('button');
  });
</script>
</body>
</html>
